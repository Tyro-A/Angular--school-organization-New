
  <form #form="ngForm"  (submit)="onSubmit(form)" autocomplete="off">
    <div class="form-group">
        <label>Organization Name</label>
        <input name="OrganizationName" #OrganizationName ="ngModel" [(ngModel)] ="service.OrgformData.name" class="form-control" required>
        <div class="text-danger" *ngIf="OrganizationName.invalid && OrganizationName.touched">Please enter organization's name</div>   
    </div>
    <div class="form-group">
        <label>Subject</label>
        <input name="Subject" #Subject ="ngModel" [(ngModel)] ="service.OrgformData.subject" class="form-control" required>
        <div class="text-danger" *ngIf="Subject.invalid && Subject.touched">Please enter subject</div>   
    </div>
    <div class="form-group">
        <label>Adviser</label>
        <input name="Adviser" #Adviser ="ngModel" [(ngModel)] ="service.OrgformData.adviser" class="form-control" required>
        <div class="text-danger" *ngIf="Adviser.invalid && Adviser.touched">Please enter name of adviser</div>   
    </div>
    <div class="form-group">
        <button type="submit" [disabled] = "form.invalid" value="submit" class="btn btn-lg btn-warning btn-block">Save</button> 
    </div>
</form>
