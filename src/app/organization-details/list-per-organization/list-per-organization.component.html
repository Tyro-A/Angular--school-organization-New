<table class="table table-hover">
    <tr>
        <th>FirstName</th>
        <th>LastName</th>
        <th>YearLevel</th>
        <th>Course</th>
      </tr>
    <tr *ngFor="let pd of service.StudlistperOrg">
      <td>{{pd.firstName}}</td>
      <td>{{pd.lastName}}</td>
      <td >{{pd.yearLevel}}</td>
      <td>{{pd.course}}</td>

    </tr>
  </table>
